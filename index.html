<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Fit By Rob | Personal Training for Strength, Endurance & Nutrition</title>
    <meta
      name="description"
      content="Personal training with Rob: build strength, endurance, and confidence with a program built around your goals. Strength training, conditioning, nutrition guidance, and custom coaching."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Fit By Rob | Personal Training" />
    <meta
      property="og:description"
      content="Build strength, endurance, and confidence with personal training built around your goals."
    />
    <meta property="og:image" content="https://fitbyrobroche.com/favicon.png" />
    <meta property="og:url" content="https://fitbyrobroche.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Fit By Rob | Personal Training" />
    <meta
      name="twitter:description"
      content="Build strength, endurance, and confidence with personal training built around your goals."
    />
    <meta name="twitter:image" content="https://fitbyrobroche.com/favicon.png" />
  </head>
  <body>
    <!--
      Netlify Forms detection. Netlify's build bot scans the deployed HTML for
      a static form to register; the real, interactive form is rendered by
      React and posts to this "contact" form. Keep the field names in sync
      with src/components/ContactForm/ContactForm.jsx.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="fullName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="fitnessGoal" />
      <input type="text" name="trainingType" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
